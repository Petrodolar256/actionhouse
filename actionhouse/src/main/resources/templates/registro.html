<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ActionHouse – Crear cuenta</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
    <link rel="stylesheet" th:href="@{/css/accessibility.css}">
</head>
<body>
<a href="#contenido-principal" class="skip-link">
    Saltar al contenido principal
</a>
<main class="auth-container" id="contenido-principal" role="main">
    <div class="auth-card">

        <div class="auth-header">
            <h1 class="logo">Action<span>House</span></h1>
            <p>Crea tu cuenta gratuita</p>
        </div>

        <div th:if="${error}" class="alert alert-error" role="alert">
            <span th:text="${error}"></span>
        </div>

        <form th:action="@{/registro}" method="post" novalidate>

            <div class="form-group">
                <label for="nombre">Nombre completo</label>
                <input type="text"
                       id="nombre"
                       name="nombre"
                       placeholder="Tu nombre"
                       autocomplete="name"
                       required
                       aria-required="true"
                       minlength="2"
                       maxlength="100">
            </div>

            <div class="form-group">
                <label for="email">Correo electrónico</label>
                <input type="email"
                       id="email"
                       name="email"
                       placeholder="tu@email.com"
                       autocomplete="email"
                       required
                       aria-required="true">
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password"
                       id="password"
                       name="password"
                       placeholder="Mínimo 8 caracteres"
                       autocomplete="new-password"
                       required
                       aria-required="true"
                       minlength="8">
                <small class="field-hint">
                    Mínimo 8 caracteres
                </small>
            </div>

            <button type="submit" class="btn-primary">
                Crear cuenta
            </button>

        </form>

        <p class="auth-link">
            ¿Ya tienes cuenta?
            <a th:href="@{/login}">Inicia sesión</a>
        </p>

    </div>
</main>
</body>
</html>
