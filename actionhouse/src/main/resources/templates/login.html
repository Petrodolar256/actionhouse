<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ActionHouse – Iniciar sesión</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
    <link rel="stylesheet" th:href="@{/css/accessibility.css}">
</head>
<body>
<a href="#contenido-principal" class="skip-link">
    Saltar al contenido principal
</a>
<main class="auth-container" id="contenido-principal" role="main">
    <div class="auth-card">

        <div class="auth-header">
            <h1 class="logo">Action<span>House</span></h1>
            <p>Lo que para uno es basura, para otro es un tesoro</p>
        </div>

        <!-- Mensajes de error o éxito -->
        <div th:if="${error}" class="alert alert-error" role="alert">
            <span th:text="${error}"></span>
        </div>
        <div th:if="${mensaje}" class="alert alert-success" role="alert">
            <span th:text="${mensaje}"></span>
        </div>
        <div th:if="${param.registro}" class="alert alert-success" role="alert">
            Cuenta creada correctamente. ¡Ya puedes iniciar sesión!
        </div>
        <div th:if="${param.cuenta}" class="alert alert-success" role="alert">
            Tu cuenta ha sido eliminada correctamente.
        </div>

        <form th:action="@{/login}" method="post" novalidate>

            <div class="form-group">
                <label for="username">Correo electrónico</label>
                <input type="email"
                       id="username"
                       name="username"
                       placeholder="tu@email.com"
                       autocomplete="email"
                       required
                       aria-required="true">
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password"
                       id="password"
                       name="password"
                       placeholder="Tu contraseña"
                       autocomplete="current-password"
                       required
                       aria-required="true">
            </div>

            <button type="submit" class="btn-primary">
                Iniciar sesión
            </button>

        </form>

        <p class="auth-link">
            ¿No tienes cuenta?
            <a th:href="@{/registro}">Regístrate aquí</a>
        </p>

    </div>
</main>
</body>
</html>
